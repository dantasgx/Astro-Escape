<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Escape</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Astro Escape</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="dev.html">Desenvolvedor</a>
            <a href="jogo.html">Jogar</a>
        </nav>
    </header>

  <main>
    <section>
      <canvas id="gameCanvas" width="800" height="400"></canvas>
    </section>

    <section class="hud">
      <p>Vidas: <span id="vidas">2</span></p>
      <p>Fase: <span id="fase">1</span></p>
      <p>Itens: <span id="itens">0</span>/2</p>
      <p>Mortes Totais: <span id="mortes">0</span></p>
    </section>

    <section>
      <button id="startButton">Iniciar jogo</button>
    </section>
  </main>
    <section>
      <h2>Comandos</h2>
      <p>A / ← : mover para a esquerda</p>
      <p>D / → : mover para a direita</p>
      <p>W / ↑ / : pular</p>
    </section>

  <script src="js/game.js"></script>
